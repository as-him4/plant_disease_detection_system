{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set New Password - Plant Disease Detection</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>

  <body class="login-page">
    <div class="container">
      <div class="form-box active">
        {% if error %}
        <div style="text-align: center; padding: 30px">
          <h2 style="color: #e74c3c">Reset Link Invalid</h2>
          <p style="color: #666; margin: 20px 0">{{ error }}</p>
          <a
            href="{% url 'password_reset_request' %}"
            style="
              display: inline-block;
              margin-top: 10px;
              color: #3498db;
              text-decoration: none;
            "
          >
            Request a new link
          </a>
        </div>
        {% else %}
        <form id="passwordResetConfirmForm">
          {% csrf_token %}
          <h2>Set New Password</h2>
          <p style="margin-bottom: 20px; color: #666; font-size: 14px">
            Hi {{ username }}, enter your new password below.
          </p>

          <div
            id="reset-confirm-error"
            class="form-error"
            style="display: none"
          ></div>
          <div
            id="reset-confirm-success"
            class="form-success"
            style="display: none"
          ></div>

          <input
            type="password"
            name="password"
            placeholder="New Password"
            required
            minlength="8"
          />
          <input
            type="password"
            name="confirm_password"
            placeholder="Confirm New Password"
            required
            minlength="8"
          />

          <button type="submit">Reset Password</button>

          <p style="text-align: center; margin-top: 20px">
            <a href="{% url 'index' %}">Back to Login</a>
          </p>
        </form>
        {% endif %}
      </div>
    </div>

    <script>
      const CSRF_TOKEN = "{{ csrf_token }}";
    </script>
    <script src="{% static 'js/script.js' %}"></script>
  </body>
</html>
